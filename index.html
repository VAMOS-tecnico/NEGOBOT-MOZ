<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Negobot Moz | O chatbot que fecha vendas para o seu negócio 24horas por dia</title>
  
  <!-- SEO & Social Meta Tags -->
  <meta name="description" content="Automatize seu atendimento no WhatsApp, Facebook e Website com o Negobot Moz. O chatbot que trabalha 24h por dia para o seu negócio.">
  <meta property="og:type" content="website">
  <meta property="og:title" content="Negobot Moz | Chatbot de Vendas 24h">
  <meta property="og:description" content="A solução definitiva para PMEs moçambicanas venderem mais no digital.">

  <style>
    :root {
      --bg: #050505;
      --gold: #d4af37;
      --gold-vibrant: #ffcc33;
      --emerald: #10b981;
      --text: #ffffff;
      --glass: rgba(255, 255, 255, 0.05);
      --glass-border: rgba(255, 255, 255, 0.15);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    
    html, body { 
      background-color: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      overflow-x: hidden;
      width: 100%;
      scroll-behavior: smooth;
    }

    .bg-system {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      z-index: -1;
      background: var(--bg);
    }
    .aura {
      position: absolute;
      width: 100vw; height: 100vw;
      border-radius: 50%;
      filter: blur(100px);
      opacity: 0.2;
    }
    .aura-1 { top: -20%; right: -20%; background: radial-gradient(circle, var(--gold) 0%, transparent 70%); }
    .aura-2 { bottom: -20%; left: -20%; background: radial-gradient(circle, var(--emerald) 0%, transparent 70%); }

    nav {
      padding: 12px 5%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(5,5,5,0.9);
      backdrop-filter: blur(15px);
      position: sticky;
      top: 0;
      z-index: 1000;
      border-bottom: 1px solid var(--glass-border);
    }
    .brand { font-size: 18px; font-weight: 900; }
    .brand span { color: var(--gold-vibrant); }
    
    .nav-cta {
      background: var(--emerald);
      color: #fff;
      padding: 6px 12px;
      border-radius: 50px;
      font-size: 10px;
      font-weight: 900;
      text-decoration: none;
      text-transform: uppercase;
    }

    .hero { padding: 40px 8% 30px; text-align: center; }
    .hero h1 { font-size: 32px; font-weight: 900; line-height: 1.1; margin-bottom: 15px; }
    .hero h1 span { color: var(--gold-vibrant); }
    .hero p { font-size: 15px; color: rgba(255,255,255,0.7); max-width: 550px; margin: 0 auto 25px; line-height: 1.5; }

    .cta-button {
      width: 100%;
      max-width: 300px;
      padding: 16px;
      background: linear-gradient(135deg, #d4af37 0%, #ffcc33 100%);
      color: #000;
      text-decoration: none;
      font-weight: 900;
      font-size: 15px;
      border-radius: 8px;
      display: inline-block;
      text-transform: uppercase;
      text-align: center;
    }

    .features { padding: 30px 5%; display: flex; flex-direction: column; gap: 15px; }
    .feature-card { background: var(--glass); border: 1px solid var(--glass-border); padding: 20px; border-radius: 12px; }
    .feature-card h3 { color: var(--gold-vibrant); margin-bottom: 8px; font-size: 18px; }
    .feature-card p { color: rgba(255,255,255,0.6); font-size: 14px; line-height: 1.5; }

    .chat-preview { padding: 30px 5%; text-align: center; }
    .omni-container { display: flex; flex-direction: column; gap: 20px; margin-top: 20px; align-items: center; justify-content: center; }
    
    .mockup { width: 250px; height: 420px; border-radius: 25px; overflow: hidden; position: relative; border: 5px solid #222; background: #fff; box-shadow: 0 12px 25px rgba(0,0,0,0.4); margin-bottom: 15px; }
    .mockup-label { font-size: 13px; font-weight: 900; color: var(--gold-vibrant); margin-bottom: 8px; text-transform: uppercase; }

    .wa-header { background: #075e54; color: #fff; padding: 30px 10px 8px; display: flex; align-items: center; gap: 6px; font-size: 11px; text-align: left; }
    .wa-body { background: #e5ddd5; height: calc(100% - 65px); padding: 8px; display: flex; flex-direction: column; gap: 6px; overflow-y: auto; }
    
    .fb-header { background: #0084ff; color: #fff; padding: 30px 10px 8px; display: flex; align-items: center; gap: 6px; font-size: 11px; text-align: left; }
    .fb-body { background: #fff; height: calc(100% - 65px); padding: 8px; display: flex; flex-direction: column; gap: 6px; overflow-y: auto; }
