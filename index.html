<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Negobot Moz | Chatbot de Vendas 24h</title>
  
  <style>
    :root {
      --bg: #050505;
      --gold: #d4af37;
      --gold-vibrant: #ffcc33;
      --emerald: #10b981;
      --text: #ffffff;
      --glass: rgba(255, 255, 255, 0.05);
      --glass-border: rgba(255, 255, 255, 0.15);
      --mpesa: #af2222;
      --emola: #ff6600;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    
    html, body { 
      background-color: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      overflow-x: hidden;
      width: 100%;
      line-height: 1.6;
    }

    .container { width: 90%; max-width: 1100px; margin: 0 auto; }

    nav {
      background: rgba(5,5,5,0.95);
      backdrop-filter: blur(15px);
      padding: 15px 0;
      position: sticky;
      top: 0;
      z-index: 1000;
      border-bottom: 1px solid var(--glass-border);
    }
    nav .container { display: flex; justify-content: space-between; align-items: center; }
    .brand { font-size: 20px; font-weight: 900; letter-spacing: -1px; }
    .brand span { color: var(--gold-vibrant); }

    .hero { padding: 60px 0; text-align: center; }
    .hero h1 { font-size: 36px; font-weight: 900; line-height: 1.1; margin-bottom: 20px; color: #fff; }
    .hero h1 span { color: var(--gold-vibrant); display: block; margin-top: 10px; }
    .hero p { font-size: 16px; color: rgba(255,255,255,0.7); max-width: 600px; margin: 0 auto 30px; }

    .cta-main {
      padding: 18px 40px;
      background: linear-gradient(135deg, var(--gold) 0%, var(--gold-vibrant) 100%);
      color: #000;
      text-decoration: none;
      font-weight: 900;
      border-radius: 50px;
      display: inline-block;
      text-transform: uppercase;
      box-shadow: 0 10px 20px rgba(212, 175, 55, 0.3);
    }

    .section-title { text-align: center; font-size: 24px; margin-bottom: 40px; font-weight: 900; }
    .section-title span { color: var(--gold-vibrant); }

    .features { padding: 40px 0; display: grid; grid-template-columns: 1fr; gap: 20px; }
    .feature-card { background: var(--glass); border: 1px solid var(--glass-border); padding: 30px; border-radius: 20px; transition: 0.3s; }
    .feature-card h3 { color: var(--gold-vibrant); margin-bottom: 12px; font-size: 20px; }

    .omni-grid { display: grid; grid-template-columns: 1fr; gap: 40px; padding: 40px 0; }
    .mockup-wrap { display: flex; flex-direction: column; align-items: center; }
    .mockup { 
      width: 260px; height: 460px; border-radius: 35px; border: 8px solid #222; 
      background: #fff; position: relative; overflow: hidden; box-shadow: 0 20px 40px rgba(0,0,0,0.5); 
    }

    /* Estilos de Chat Mockup */
    .wa-header { background: #075e54; color: #fff; padding: 35px 15px 10px; font-size: 12px; font-weight: bold; }
    .wa-body { background: #e5ddd5; height: 100%; padding: 10px; display: flex; flex-direction: column; gap: 8px; }
    .msg { padding: 8px 12px; border-radius: 10px; font-size: 11px; max-width: 85%; color: #000; }
    .msg.in { background: #fff; align-self: flex-start; }
    .msg.out { background: #dcf8c6; align-self: flex-end; }

    .pricing-grid { display: grid; grid-template-columns: 1fr; gap: 30px; padding: 40px 0; }
    .price-card { 
      background: var(--glass); border: 1px solid var(--glass-border); 
      padding: 40px 30px; border-radius: 25px; position: relative; 
      display: flex; flex-direction: column;
    }
    .price-card.featured { border: 2px solid var(--gold-vibrant); background: rgba(212, 175, 55, 0.05); }
    .price-card .price { font-size: 38px; font-weight: 900; margin: 20px 0; }
    
    .payment-selector { width: 100%; margin-top: auto; }
    .payment-selector summary {
      list-style: none; cursor: pointer; padding: 18px; 
      background: #fff; color: #000; font-weight: 900; 
      border-radius: 12px; text-align: center; text-transform: uppercase;
    }
    .payment-selector[open] summary { background: #222; color: #fff; margin-bottom: 15px; }

    .pay-opt-grid { display: grid; grid-template-columns: 1fr; gap: 10px; }
    .pay-link { 
      display: flex; align-items: center; justify-content: center; gap: 15px; 
      padding: 15px; border-radius: 12px; text-decoration: none; font-weight: 900; color: #fff;
    }
    .pay-link.mpesa { background: #fff; color: var(--mpesa); border: 2px solid var(--mpesa); }
    .pay-link.emola { background: #fff; color: var(--emola); border: 2px solid var(--emola); }
    .pay-link img { width: 30px; height: 30px; object-fit: contain; }

    @media (min-width: 769px) {
      .hero h1 { font-size: 60px; }
      .features { grid-template-columns: repeat(3, 1fr); }
      .omni-grid { grid-template-columns: repeat(3, 1fr); }
      .pricing-grid { grid-template-columns: repeat(2, 1fr); max-width: 900px; margin: 0 auto; }
      <body>

<nav>
  <div class="container">
    <div class="brand">NEGOBOT<span>MOZ</span></div>
    <a href="#precos" style="color:var(--gold-vibrant); text-decoration:none; font-weight:900; font-size:14px;">TESTE GRÁTIS</a>
  </div>
</nav>

<div class="container">

  <h2 class="section-title">Porquê escolher o <span>Negobot?</span></h2>
  <section class="features">

  <h2 class="section-title">Atendimento <span>Omnichannel</span></h2>
  <section class="omni-grid">
    <div class="mockup-wrap">

        <div class="wa-header">Negobot Moz</div>

      </div>

    <div class="mockup-wrap">

        <div style="background:#fff; height:100%; padding:10px; display:flex; flex-direction:column; gap:8px;">

    <div class="mockup-wrap">

        <div style="background:#fff; height:100%; position:relative;">
          <div style="position:absolute; bottom:20px; right:20px; width:45px; height:45px; background:var(--gold); border-radius:50%; display:flex; align-items:center; justify-content:center; color:#000; font-size:20px;">💬</div>
        </div>
      </div>
    </div>
  </section>

    <div class="pricing-grid">

        <details class="payment-selector">

            <a href="https://wa.me/258855000929?text=Quero+o+Plano+Iniciação+via+M-Pesa" class="pay-link mpesa">

        <h3 style="margin-top:15px;">Elite Corporate</h3>
        <div class="price">2.900 MT <span style="font-size:14px; font-weight:normal; opacity:0.6;">/mês</span></div>
        <ul style="margin-bottom:30px; font-size:14px; color:rgba(255,255,255,0.7); list-style:none;">
          <li style="margin-bottom:10px;">✅ WhatsApp + FB + Web</li>
          <li style="margin-bottom:10px;">✅ Pagamentos Integrados</li>

        </ul>

        <details class="payment-selector">
          <summary>Assinar Agora</summary>
          <div class="pay-opt-grid">
            <a href="https://wa.me/258855000929?text=Quero+o+Plano+Elite+via+M-Pesa" class="pay-link mpesa">
              M-Pesa
            </a>
            <a href="https://wa.me/258855000929?text=Quero+o+Plano+Elite+via+e-Mola" class="pay-link emola">
              e-Mola
            </a>
          </div>
        </details>
      </div>

    </div>
  </section>

  <footer style="text-align:center; padding:40px 0; border-top:1px solid var(--glass-border); font-size:12px; color:rgba(255,255,255,0.3);">
    <p>© 2026 NEGOBOT MOZ // Grupo fácilcred</p>
    <p style="margin-top:10px;">Maputo, Moçambique</p>
  </footer>

</div>

</body>
</html>

    }
  </style>
</head>
